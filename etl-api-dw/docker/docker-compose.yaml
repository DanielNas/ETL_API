
services:

  postgres:
    image: postgres:15
    container_name: sales_dw
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: sales_dw
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sales_dw"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
